name名称：自动采集 + AI 生成文章自动采集 + AI 生成文章
on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间10点自动运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # 必须加，否则无法推送
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 自动生成文章
        run: |
          cat > auto_article.py << 'EOF'
          import random
          from datetime import datetime

          # 你可以改这里的关键词
          KEYWORDS = ["宽幅数码印花","桌布印花","2.8M 印花","3m印花", "墙布印花", "窗帘印花", "家纺印花"]

          keyword = random.choice(KEYWORDS)
          today = datetime.now().strftime("%Y-%m-%d")

          title = f"{today}：{keyword}行业新资讯"
          content = f"""
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <title>{title}</title>
          </head>
          <body>
              <h1>{title}</h1>
              <p>自动发布于 {today}</p>
              <p>{keyword} 技术持续升级，色彩更清晰、耐水洗、环保无毒。</p>
              <p>欢迎访问官网了解最新产品与服务。</p>
          </body>
          </html>
          """

          with open("article.html", "w", encoding="utf-8") as f:
              f.write(content)
          EOF

          python auto_article.py

      - name: 提交更新
        run: |
          git config --global user.name "auto"
          git config --global user.email "auto@auto.com"
          git add .
          git commit -m "自动更新 $(date +'%Y-%m-%d')"
          
      - name: 推送代码到仓库
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
