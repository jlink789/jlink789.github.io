name: 自动采集 + AI 生成文章
on:
  schedule:
    - cron: "0 2 * * *" # UTC2点=北京时间10点
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 全局强制Node24运行（实际已经用24执行）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装Python
        uses: actions/setup-python@v6 # v6是目前适配Node24最新正式版
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 自动生成文章
        run: |
          cat > auto_article.py << 'EOF'
          import random
          from datetime import datetime

          KEYWORDS = ["宽幅数码印花","桌布印花","2.8M 印花","3m印花", "墙布印花", "窗帘印花", "家纺印花"]

          keyword = random.choice(KEYWORDS)
          today = datetime.now().strftime("%Y-%m-%d")

          title = f"{today}：{keyword}行业新资讯"
          content = f"""
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <title>{title}</title>
          </head>
          <body>
              <h1>{title}</h1>
              <p>自动发布于 {today}</p>
              <p>{keyword} 技术持续升级，色彩更清晰、耐水洗、环保无毒。</p>
              <p>欢迎访问官网了解最新产品与服务。</p>
          </body>
          </html>
          """

          with open("article.html", "w", encoding="utf-8") as f:
              f.write(content)
          EOF
          python auto_article.py

      - name: 提交推送
        run: |
          git config --global user.name "auto"
          git config --global user.email "auto@auto.com"
          git add .
          git commit -m "自动更新 $(date +'%Y-%m-%d')"
          git push
